name: Fetch ETF Screener Data Daily

on:
  schedule:
    - cron: '0 7 * * 1-5'   # 12:30 PM IST on weekdays
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Fetch ETF data
        run: python fetch_etf.py

      - name: Commit etf_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etf_data.json
          git diff --staged --quiet || git commit -m "chore: update ETF screener data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
