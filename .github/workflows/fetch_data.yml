name: Fetch Market Data Daily

on:
  # Runs every day at 6:30 AM UTC (12:00 PM IST)
  schedule:
    - cron: '30 6 * * 1-5'   # Weekdays only (Mon–Fri)

  # Also allows you to trigger it manually from GitHub's UI
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit data.json back to repo

    steps:
      # 1. Check out your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install required libraries
      - name: Install dependencies
        run: |
          pip install yfinance requests pandas

      # 4. Run the data fetcher
      - name: Fetch market data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python fetch_data.py

      # 5. Commit data.json back to the repository
    - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json monthly_history.json
          git commit -m "chore: update market data $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
